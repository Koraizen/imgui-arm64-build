name: Build imgui-java ARM64
on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Verify ARM64
        run: uname -m

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            ant openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which javac))))
          echo "JAVA_HOME=$JAVA_PATH" >> $GITHUB_ENV

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Inspect build system
        run: |
          echo "=== buildSrc içeriği ==="
          find imgui-java/buildSrc -type f | sort

          echo "=== imgui-binding build dosyaları ==="
          find imgui-java/imgui-binding -name "*.gradle" -o -name "CMakeLists*" | sort

          echo "=== Mevcut Gradle task'ları ==="
          cd imgui-java
          ./gradlew imgui-binding:tasks --all 2>&1 | grep -i "generate\|native\|lib\|build" | head -30

      - name: Build ARM64 (FreeType olmadan önce dene)
        run: |
          cd imgui-java
          chmod +x gradlew
          ./gradlew imgui-binding:generateLibs -Denvs=linuxArm64 -Dlocal 2>&1
        continue-on-error: true

      - name: Show results
        run: |
          echo "=== Tüm .so dosyaları ==="
          find imgui-java -name "*.so" 2>/dev/null | while read f; do
            echo "$f"; file "$f"
          done
          echo "=== Build klasörü ==="
          find imgui-java/imgui-binding/build -type f 2>/dev/null | head -30
          echo "=== Hata log ==="
          find imgui-java -name "*.log" 2>/dev/null | while read f; do
            echo "--- $f ---"; tail -20 "$f"
          done

      - name: Upload whatever was built
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-arm64-debug
          path: |
            imgui-java/imgui-binding/build/
          retention-days: 7
        if: always()
