name: Build imgui-java ARM64
on:
  workflow_dispatch:
jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Verify ARM64
        run: uname -m

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            ant openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which javac))))
          echo "JAVA_HOME=$JAVA_PATH" >> $GITHUB_ENV

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Generate JNI headers via Gradle
        run: |
          cd imgui-java
          chmod +x gradlew
          # Sadece Java derleme + header üretimi, native build YOK
          ./gradlew imgui-binding:compileJava imgui-binding:jar 2>&1

      - name: Build native lib with CMake directly
        run: |
          cd imgui-java/imgui-binding
          
          # JNI header'larını üret
          mkdir -p build/jni/jni-headers
          javac -h build/jni/jni-headers \
            $(find src/main/java -name "*.java" | head -5) 2>/dev/null || true
          
          # CMakeLists.txt bul
          CMAKE_DIR=$(find . -name "CMakeLists.txt" | head -1 | xargs dirname)
          echo "CMakeLists found at: $CMAKE_DIR"
          
          mkdir -p cmake-build-arm64
          cd cmake-build-arm64
          
          cmake "$CMAKE_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DJAVA_HOME=$JAVA_HOME \
            -DJAVA_INCLUDE_PATH=$JAVA_HOME/include \
            -DJAVA_INCLUDE_PATH2=$JAVA_HOME/include/linux \
            -G Ninja
          
          ninja -j$(nproc)

      - name: Find and verify built .so files
        run: |
          echo "=== Tüm .so dosyaları ==="
          find imgui-java -name "*.so" -newer imgui-java/gradlew 2>/dev/null | while read f; do
            echo "--- $f ---"
            file "$f"
            readelf -h "$f" 2>/dev/null | grep Machine
          done

      - name: Collect ARM64 output
        run: |
          mkdir -p output
          find imgui-java -name "*.so" 2>/dev/null | while read f; do
            ARCH=$(readelf -h "$f" 2>/dev/null | grep Machine | grep -i "aarch\|arm" || true)
            if [ -n "$ARCH" ]; then
              echo "ARM64 bulundu: $f"
              BASENAME=$(basename "$f")
              cp "$f" "output/$BASENAME"
            fi
          done
          
          echo "=== output içeriği ==="
          ls -lh output/
          
          if [ -z "$(ls -A output/)" ]; then
            echo "HATA: Hiç ARM64 .so bulunamadı!"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-arm64-1.86.11
          path: output/
          retention-days: 30
