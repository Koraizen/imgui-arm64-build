name: Build imgui-java ARM64
on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Verify ARM64
        run: uname -m

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            ant openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which javac))))
          echo "JAVA_HOME=$JAVA_PATH" >> $GITHUB_ENV

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Vendor FreeType
        run: |
          cd imgui-java
          chmod +x buildSrc/scripts/vendor_freetype.sh
          bash buildSrc/scripts/vendor_freetype.sh

      - name: Build ARM64 native lib
        run: |
          cd imgui-java
          chmod +x gradlew
          ./gradlew imgui-binding:generateLibs -Denvs=linuxArm64 -Dlocal

      - name: Show produced files
        run: |
          find imgui-java -name "*.so" -exec sh -c 'echo "$1:"; file "$1"' _ {} \;
          find imgui-java/imgui-binding/build -type f 2>/dev/null

      - name: Collect output
        run: |
          mkdir -p output
          find imgui-java -name "*.so" -exec cp {} output/ \;
          ls -lh output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-arm64-natives-1.86.11
          path: output/
          retention-days: 30
