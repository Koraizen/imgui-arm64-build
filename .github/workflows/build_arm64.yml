name: Build imgui-java ARM64
on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Verify ARM64
        run: uname -m

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            ant openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which javac))))
          echo "JAVA_HOME=$JAVA_PATH" >> $GITHUB_ENV

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Build ARM64 native lib
        run: |
          cd imgui-java
          chmod +x gradlew
          ./gradlew imgui-binding:generateLibs -Denvs=linuxArm64 -Dlocal 2>&1

      - name: Show all .so files with architecture
        run: |
          find imgui-java/bin -name "*.so" 2>/dev/null | while read f; do
            echo "--- $f ---"
            file "$f"
            readelf -h "$f" 2>/dev/null | grep Machine
          done

      - name: Collect output - freetype version only
        run: |
          mkdir -p output
          # freetype klasöründeki ARM64 .so'yu al
          FT_SO="imgui-java/bin/freetype/libimgui-java64.so"
          PLAIN_SO="imgui-java/bin/libimgui-java64.so"

          if [ -f "$FT_SO" ]; then
            ARCH=$(readelf -h "$FT_SO" 2>/dev/null | grep Machine | grep -i "aarch\|arm" || true)
            if [ -n "$ARCH" ]; then
              echo "Freetype ARM64 .so bulundu: $FT_SO"
              cp "$FT_SO" output/libimgui-java64.so
            else
              echo "UYARI: freetype .so ARM64 değil: $(file $FT_SO)"
            fi
          fi

          if [ -f "$PLAIN_SO" ]; then
            ARCH=$(readelf -h "$PLAIN_SO" 2>/dev/null | grep Machine | grep -i "aarch\|arm" || true)
            if [ -n "$ARCH" ]; then
              echo "Plain ARM64 .so bulundu: $PLAIN_SO"
              cp "$PLAIN_SO" output/libimgui-java64-noft.so
            else
              echo "Plain .so ARM64 değil, atlanıyor: $(file $PLAIN_SO)"
            fi
          fi

          echo "=== output içeriği ==="
          ls -lh output/
          for f in output/*.so; do
            echo "$f:"; file "$f"; readelf -h "$f" 2>/dev/null | grep Machine
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-arm64-1.86.11
          path: output/
          retention-days: 30
