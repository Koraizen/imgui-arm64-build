name: Build imgui-java ARM64

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            ant openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $GITHUB_ENV

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Build with Gradle (native ARM64)
        run: |
          cd imgui-java
          chmod +x gradlew
          ./gradlew imgui-binding:generateLibs -Denvs=linux64 -Dlocal

      - name: Debug - tum dosyalari listele
        run: |
          echo "=== imgui-java dizin yapisi ==="
          find imgui-java -name "*.so" 2>/dev/null
          echo "=== build dizini ==="
          find imgui-java/imgui-binding -type f 2>/dev/null | head -50
          echo "=== tum so dosyalari ==="
          find . -name "*.so" 2>/dev/null

      - name: Collect so files
        run: |
          mkdir -p output
          # Tum .so dosyalarini kopyala
          find imgui-java -name "*.so" -exec cp {} output/ \; 2>/dev/null || true
          find imgui-java -name "libimgui*" -exec cp {} output/ \; 2>/dev/null || true
          echo "=== output klasoru ==="
          ls -la output/ || echo "output bos"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-arm64-1.86.11
          path: output/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload entire build dir as fallback
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-full-build
          path: imgui-java/imgui-binding/
          if-no-files-found: warn
          retention-days: 30
