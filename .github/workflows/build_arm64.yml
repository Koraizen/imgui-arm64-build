name: Build imgui-java ARM64
on:
  workflow_dispatch:
jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Verify ARM64
        run: uname -m

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            ant openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which javac))))
          echo "JAVA_HOME=$JAVA_PATH" >> $GITHUB_ENV

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Debug - repo yapısını göster
        run: |
          echo "=== imgui-java kök ==="
          ls -la imgui-java/
          echo ""
          echo "=== imgui-binding içeriği ==="
          ls -la imgui-java/imgui-binding/ 2>/dev/null || echo "imgui-binding yok"
          echo ""
          echo "=== Tüm CMakeLists.txt ==="
          find imgui-java -name "CMakeLists.txt" 2>/dev/null
          echo ""
          echo "=== Tüm build.gradle ==="
          find imgui-java -name "build.gradle" 2>/dev/null
          echo ""
          echo "=== buildSrc içeriği ==="
          ls -la imgui-java/buildSrc/src/ 2>/dev/null || echo "yok"
          find imgui-java/buildSrc -name "*.groovy" 2>/dev/null
