name: Build imgui-java ARM64
on:
  workflow_dispatch:
jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Verify ARM64
        run: uname -m

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            ant openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which javac))))
          echo "JAVA_HOME=$JAVA_PATH" >> $GITHUB_ENV

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Generate JNI files (Gradle step only)
        run: |
          cd imgui-java
          chmod +x gradlew
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Denvs=linux -Dlocal
          EOF
          # Sadece Java derleme + JNI üretimi, Ant compile'ı henüz yapma
          # generateLibs Ant'i çalıştırır ve başarısız olur ama JNI dosyaları üretilir
          ./gradlew imgui-binding:generateLibs || true

      - name: Patch Ant build XML for ARM64
        run: |
          BUILD_XML="imgui-java/imgui-binding/build/jni/build-linux64.xml"
          
          if [ ! -f "$BUILD_XML" ]; then
            echo "HATA: $BUILD_XML bulunamadı!"
            ls imgui-java/imgui-binding/build/jni/ 2>/dev/null || echo "jni klasörü yok"
            exit 1
          fi
          
          echo "=== Orijinal compiler flags ==="
          grep -E "mfpmath|msse|m64|cppflags|FLAGS" "$BUILD_XML" | head -20
          
          # ARM64'te geçersiz olan x86 flag'leri kaldır
          sed -i 's/-mfpmath=sse//g' "$BUILD_XML"
          sed -i 's/-msse2\b//g' "$BUILD_XML"
          sed -i 's/-msse\b//g' "$BUILD_XML"
          sed -i 's/-m64\b//g' "$BUILD_XML"
          
          echo "=== Patch sonrası ==="
          grep -E "mfpmath|msse|m64|FLAGS" "$BUILD_XML" | head -20

      - name: Build with Ant directly (ARM64)
        run: |
          BUILD_XML="imgui-java/imgui-binding/build/jni/build-linux64.xml"
          JNI_DIR="imgui-java/imgui-binding/build/jni"
          
          cd "$JNI_DIR"
          ant -f build-linux64.xml -v -Dhas-compiler=true -Drelease=true clean postcompile
          
          echo "=== postcompile sonrası dosyalar ==="
          find . -name "*.so" 2>/dev/null | while read f; do
            echo "$f:"; file "$f"
          done

      - name: Pack natives
        run: |
          cd imgui-java/imgui-binding/build/jni
          ant -f build.xml -v pack-natives || true
          
          echo "=== libsNative içeriği ==="
          find ../../libsNative -name "*.so" 2>/dev/null | while read f; do
            echo "$f:"; file "$f"
          done

      - name: Collect ARM64 output
        run: |
          mkdir -p output
          find imgui-java -name "*.so" -newer imgui-java/gradlew 2>/dev/null | while read f; do
            ARCH=$(readelf -h "$f" 2>/dev/null | grep Machine | grep -i "aarch\|arm" || true)
            if [ -n "$ARCH" ]; then
              echo "ARM64 bulundu: $f"
              cp "$f" "output/$(basename $f)"
            fi
          done
          
          # newer ile bulamazsa tüm .so'lara bak
          if [ -z "$(ls -A output/ 2>/dev/null)" ]; then
            find imgui-java -name "*.so" 2>/dev/null | while read f; do
              ARCH=$(readelf -h "$f" 2>/dev/null | grep Machine | grep -i "aarch\|arm" || true)
              if [ -n "$ARCH" ]; then
                echo "ARM64 bulundu: $f"
                cp "$f" "output/$(basename $f)"
              fi
            done
          fi

          echo "=== output içeriği ==="
          ls -lh output/

          if [ -z "$(ls -A output/ 2>/dev/null)" ]; then
            echo "HATA: ARM64 .so bulunamadı!"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-arm64-1.86.11
          path: output/
          retention-days: 30
