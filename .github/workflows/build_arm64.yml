name: Build imgui-java ARM64
on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Verify ARM64
        run: uname -m

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which javac))))
          echo "JAVA_HOME=$JAVA_PATH" >> $GITHUB_ENV
          echo "JAVA_HOME: $JAVA_PATH"
          ls "$JAVA_PATH/include/"

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Show CMakeLists location
        run: |
          find imgui-java -name "CMakeLists.txt" | head -10
          echo "=== imgui-binding/src/main/native ==="
          ls imgui-java/imgui-binding/src/main/native/ 2>/dev/null || echo "yok"
          echo "=== buildSrc scripts ==="
          find imgui-java/buildSrc -type f | sort

      - name: Build native .so with CMake directly
        run: |
          JAVA_HOME_VAL=$JAVA_HOME
          
          # imgui-java'nın CMakeLists.txt'ini bul
          CMAKE_DIR=$(find imgui-java -name "CMakeLists.txt" | grep -v "/include/" | head -1 | xargs dirname)
          echo "CMake dizini: $CMAKE_DIR"
          
          mkdir -p native-build
          cd native-build
          
          cmake "$OLDPWD/$CMAKE_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DJAVA_HOME="$JAVA_HOME_VAL" \
            -DJAVA_INCLUDE_PATH="$JAVA_HOME_VAL/include" \
            -DJAVA_INCLUDE_PATH2="$JAVA_HOME_VAL/include/linux" \
            -DIMGUI_FREETYPE=ON \
            -G Ninja 2>&1
          
          ninja -v 2>&1
          
          echo "=== Üretilen dosyalar ==="
          find . -name "*.so" | while read f; do echo "$f"; file "$f"; done

      - name: Fallback - Gradle generateLibs with verbose
        if: always()
        run: |
          cd imgui-java
          chmod +x gradlew
          ./gradlew imgui-binding:generateLibs -Denvs=linuxArm64 -Dlocal --info 2>&1 | tail -100
        continue-on-error: true

      - name: Collect all .so files
        if: always()
        run: |
          mkdir -p output
          find . -name "*.so" 2>/dev/null | while read f; do
            echo "Kopyalanıyor: $f"
            cp "$f" output/
          done
          echo "=== output içeriği ==="
          ls -lh output/ || echo "Hiç .so bulunamadı"

      - name: Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: imgui-java-arm64-1.86.11
          path: output/
          retention-days: 30
