name: Build imgui-java ARM64
on:
  workflow_dispatch:
jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Verify ARM64
        run: uname -m

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            ant openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which javac))))
          echo "JAVA_HOME=$JAVA_PATH" >> $GITHUB_ENV

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Debug - GenerateLibs.groovy içeriğini göster
        run: |
          cat imgui-java/buildSrc/src/main/groovy/tool/generator/GenerateLibs.groovy

      - name: Build ARM64 native lib
        run: |
          cd imgui-java
          chmod +x gradlew
          # -Plocal → local build yap (prebuilt binary kullanma)
          # -Penvs=linuxArm64 → sadece ARM64 hedef
          ./gradlew imgui-binding:generateLibs -Plocal -Penvs=linuxArm64 --info 2>&1 | tail -100

      - name: Find all .so files and check architecture
        run: |
          echo "=== Tüm .so dosyaları ==="
          find imgui-java -name "*.so" 2>/dev/null | while read f; do
            echo "--- $f ---"
            file "$f"
            readelf -h "$f" 2>/dev/null | grep Machine
          done

      - name: Collect ARM64 output
        run: |
          mkdir -p output
          find imgui-java -name "*.so" 2>/dev/null | while read f; do
            ARCH=$(readelf -h "$f" 2>/dev/null | grep Machine | grep -i "aarch\|arm" || true)
            if [ -n "$ARCH" ]; then
              echo "ARM64 bulundu: $f"
              cp "$f" "output/$(basename $f)"
            fi
          done

          echo "=== output içeriği ==="
          ls -lh output/

          if [ -z "$(ls -A output/ 2>/dev/null)" ]; then
            echo "HATA: ARM64 .so bulunamadı!"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-arm64-1.86.11
          path: output/
          retention-days: 30
