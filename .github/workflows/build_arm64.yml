name: Build imgui-java ARM64

on:
  workflow_dispatch:

jobs:
  build-arm64:
    # GitHub'un ücretsiz ARM64 Linux runner'ı
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git cmake ninja-build \
            gcc g++ \
            libfreetype-dev \
            ant openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $GITHUB_ENV

      - name: Clone imgui-java 1.86.11
        run: |
          git clone --recurse-submodules https://github.com/SpaiR/imgui-java.git
          cd imgui-java
          git checkout v1.86.11
          git submodule update --init --recursive

      - name: Build with Gradle (native ARM64)
        run: |
          cd imgui-java
          chmod +x gradlew
          ./gradlew imgui-binding:generateLibs -Denvs=linux64 -Dlocal

      - name: Find and collect .so
        run: |
          echo "=== Bulunan dosyalar ==="
          find imgui-java/imgui-binding/build -name "*.so" 2>/dev/null
          mkdir -p output
          find imgui-java/imgui-binding/build -name "*.so" -exec cp {} output/ \;
          ls -la output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-arm64-1.86.11
          path: output/
          retention-days: 30
